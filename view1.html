<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.0.1/css/bootstrap.min.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Login</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" href="view2.html">Register</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Login</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="d-flex justify-content-center align-items-start vh-100" style="padding-top: 50px;">
  <div class="wrapper">
    <div class="form_container" style="width: 300px;">
      <h2>S'identifier</h2>
      <br>
      <form id="loginForm">
        <div class="mb-3 position-relative">
          <input type="email" id="email" class="form-control" placeholder="@gmail.com" required>
          <i class="fas fa-user position-absolute" style="top: 10px; right: 10px;"></i>
        </div>
        <div class="mb-3 position-relative">
          <input type="password" id="password" class="form-control" placeholder="Mot de passe" required>
          <i class="fas fa-lock position-absolute" style="top: 10px; right: 10px;"></i>
        </div>
        <div class="d-flex justify-content-center mb-2">
          <button type="submit" class="btn btn-dark">Se connecter</button>
        </div>
      </form>
      <p class="mt-3">Tu n’as pas de compte ? <a href="view2.html">S'inscrire</a></p>
    </div>
  </div>
</div>
<form id="loginForm">
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Mot de passe" required>
  <button type="submit">Se connecter</button>
</form>

<script>
  const loginForm = document.getElementById('loginForm');

  loginForm.addEventListener('submit', function(event) {
    event.preventDefault();
    //recuperation des elements
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    //envoi de requette a php
    fetch('connexion.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    })
    //attenre la reponse
    .then(response => response.json())
    .then(data => {
      if (data.success) { //si reponse correcte enregistrer la dans localhost
        localStorage.setItem('username', data.username);
        localStorage.setItem('email', data.email);
        window.location.href = 'profile.html';
      } else {
        alert('Email ou mot de passe incorrect');
      }
    })
    .catch(error => console.error('Erreur:', error));
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

</body>
</html>
