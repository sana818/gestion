<!DOCTYPE html> 
<html lang="fr"> 
<head>     
    <meta charset="UTF-8">     
    <meta name="viewport" content="width=device-width, initial-scale=1.0">     
    <title>EmployeeSpace Pro - Tableau de bord</title>     
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">     
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">     
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">     
    <style>         
        * {             
            margin: 0;             
            padding: 0;             
            box-sizing: border-box;         
        }         

        :root {             
            --primary: #4a6fa5;        
            --primary-light: #5a7bb5;   
            --secondary: #4dabf7;        
            --accent: #90caf9;           
            --success: #2E8B57;             
            --warning: #FFA500;             
            --danger: #DC143C;             
            --info: #4a6fa5;             
            --dark: #1A1A2E;             
            --light: #F8F9FA;             
            --gradient-1: linear-gradient(135deg, #4a6fa5 0%, #4dabf7 100%); 
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);             
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);             
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);             
            --glass-bg: rgba(255, 255, 255, 0.95);             
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);             
            --sidebar-width: 300px;             
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);             
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05);             
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);             
            --shadow-xl: 0 20px 25px rgba(0,0,0,0.15);         
        }         

        body {             
            font-family: 'Inter', sans-serif;             
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);             
            min-height: 100vh;             
            color: var(--dark);         
        }         

        /* Glassmorphism Sidebar */         
        .sidebar {             
            position: fixed;             
            left: 20px;             
            top: 20px;             
            bottom: 20px;             
            width: var(--sidebar-width);             
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); 
            backdrop-filter: blur(10px);             
            border-radius: 24px;             
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(255, 255, 255, 0.5);             
            z-index: 1000;             
            overflow-y: auto;             
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);             
            border: 1px solid rgba(255, 255, 255, 0.1);         
        }         

        .sidebar::-webkit-scrollbar {             
            width: 5px;         
        }         

        .sidebar::-webkit-scrollbar-track {             
            background: transparent;         
        }         

        .sidebar::-webkit-scrollbar-thumb {             
            background: var(--secondary);             
            border-radius: 10px;         
        }         

        .sidebar-header {             
            padding: 30px 25px 20px;             
            text-align: center;             
            position: relative;         
        }         

        .sidebar-header::after {             
            content: '';             
            position: absolute;             
            bottom: 0;             
            left: 15%;             
            width: 70%;             
            height: 1px;             
            background: linear-gradient(90deg, transparent, var(--secondary), transparent);         
        }         

        .user-avatar-wrapper {             
            position: relative;             
            width: 100px;             
            height: 100px;             
            margin: 0 auto 15px;             
            cursor: pointer;         
        }         

        .user-avatar {             
            width: 100px;             
            height: 100px;             
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;             
            object-fit: cover;             
            border: 3px solid white;             
            box-shadow: var(--shadow-lg), 0 0 0 3px rgba(255, 255, 255, 0.5);             
            transition: all 0.5s ease;             
            animation: morphing 8s ease-in-out infinite;         
        }         

        @keyframes morphing {             
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }             
            25% { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }             
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }             
            75% { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }             
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }         
        }         

        .user-avatar:hover {             
            transform: scale(1.05) rotate(5deg);         
        }         

        .online-indicator {             
            position: absolute;             
            bottom: 10px;             
            right: 10px;             
            width: 15px;             
            height: 15px;             
            background: var(--success);             
            border-radius: 50%;             
            border: 2px solid white;             
            animation: pulse 2s infinite;         
        }         

        @keyframes pulse {             
            0% { box-shadow: 0 0 0 0 rgba(46, 139, 87, 0.7); }             
            70% { box-shadow: 0 0 0 10px rgba(46, 139, 87, 0); }             
            100% { box-shadow: 0 0 0 0 rgba(46, 139, 87, 0); }         
        }         

        .user-name {             
            font-size: 1.4rem;             
            font-weight: 700;             
            background: linear-gradient(135deg, #fff, var(--secondary));             
            -webkit-background-clip: text;             
            -webkit-text-fill-color: transparent;             
            margin-bottom: 5px;         
        }         

        .user-title {             
            display: inline-block;             
            padding: 5px 15px;             
            background: linear-gradient(135deg, rgba(74, 111, 165, 0.1), rgba(77, 171, 247, 0.1)); 
            border-radius: 20px;             
            font-size: 0.85rem;             
            font-weight: 600;             
            color: var(--secondary);             
            margin-top: 5px;         
        }         

        .time-display {             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            color: white;             
            padding: 10px 20px;             
            border-radius: 50px;             
            font-size: 1rem;             
            margin: 20px auto 10px;             
            display: inline-flex;             
            align-items: center;             
            gap: 10px;             
            box-shadow: var(--shadow-md);             
            border: 1px solid rgba(255, 255, 255, 0.3);         
        }         

        /* Navigation */         
        .sidebar-nav {             
            padding: 20px 15px;         
        }         

        .nav-item {             
            margin-bottom: 5px;         
        }         

        .nav-link {             
            padding: 14px 20px;             
            border-radius: 12px;             
            color: rgba(255, 255, 255, 0.8);             
            font-weight: 500;             
            transition: all 0.3s ease;             
            position: relative;             
            overflow: hidden;             
            text-decoration: none;             
            display: flex;             
            align-items: center;             
            cursor: pointer;         
        }         

        .nav-link::before {             
            content: '';             
            position: absolute;             
            top: 0;             
            left: 0;             
            width: 100%;             
            height: 100%;             
            background: linear-gradient(90deg, rgba(77, 171, 247, 0.1), transparent);             
            transform: translateX(-100%);             
            transition: transform 0.4s ease;         
        }         

        .nav-link:hover::before {             
            transform: translateX(0);         
        }         

        .nav-link.active {             
            background: linear-gradient(90deg, rgba(77, 171, 247, 0.15), transparent);             
            color: white;             
            border-left: 4px solid var(--secondary);             
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);         
        }         

        .nav-link.active i {             
            color: var(--secondary);         
        }         

        .nav-link i {             
            width: 24px;             
            font-size: 1.2rem;             
            color: rgba(255, 255, 255, 0.6);             
            transition: all 0.3s ease;         
        }         

        .badge-notification {             
            margin-left: auto;             
            background: var(--gradient-2);             
            color: white;             
            border-radius: 50px;             
            padding: 4px 8px;             
            font-size: 0.7rem;             
            font-weight: 600;             
            box-shadow: var(--shadow-sm);         
        }         

        /* Main Content */         
        .main-content {             
            margin-left: calc(var(--sidebar-width) + 30px);             
            padding: 20px 30px;             
            min-height: 100vh;         
        }         

        /* Header Cards */         
        .header-cards {             
            display: grid;             
            grid-template-columns: repeat(4, 1fr);             
            gap: 20px;             
            margin-bottom: 30px;         
        }         

        .header-card {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 25px;             
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.5);             
            transition: all 0.3s ease;             
            position: relative;             
            overflow: hidden;             
            z-index: 1;             
            border: var(--glass-border);         
        }         

        .header-card::before {             
            content: '';             
            position: absolute;             
            top: 0;             
            left: 0;             
            right: 0;             
            bottom: 0;             
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));             
            z-index: -1;         
        }         

        .header-card:hover {             
            transform: translateY(-5px) scale(1.02);             
            box-shadow: var(--shadow-xl);         
        }         

        .header-card .card-icon {             
            width: 50px;             
            height: 50px;             
            border-radius: 15px;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            font-size: 1.5rem;             
            margin-bottom: 15px;             
            background: var(--gradient-1);             
            color: white;             
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4);         
        }         

        .card-icon.entry { background: var(--gradient-1); }         
        .card-icon.exit { background: var(--gradient-2); }         
        .card-icon.grade { background: var(--gradient-3); }         
        .card-icon.date { background: var(--gradient-4); }         

        .card-value {             
            font-size: 1.8rem;             
            font-weight: 700;             
            color: var(--primary);             
            line-height: 1.2;         
        }         

        .card-label {             
            color: #666;             
            font-size: 0.9rem;             
            font-weight: 500;         
        }         

        /* Profile Section */         
        .profile-section {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 30px;             
            margin-bottom: 30px;             
            border: var(--glass-border);         
        }         

        .section-title {             
            display: flex;             
            align-items: center;             
            gap: 10px;             
            margin-bottom: 25px;             
            padding-bottom: 15px;             
            border-bottom: 2px dashed rgba(74, 111, 165, 0.2); 
        }         

        .section-title i {             
            width: 40px;             
            height: 40px;             
            border-radius: 10px;             
            background: var(--gradient-1);             
            color: white;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            font-size: 1.2rem;         
        }         

        .section-title h4 {             
            font-size: 1.3rem;             
            font-weight: 700;             
            margin: 0;             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            -webkit-background-clip: text;             
            -webkit-text-fill-color: transparent;         
        }         

        .info-grid {             
            display: grid;             
            grid-template-columns: repeat(2, 1fr);             
            gap: 25px;         
        }         

        .info-card {             
            background: rgba(255, 255, 255, 0.5);             
            backdrop-filter: blur(5px);             
            border-radius: 16px;             
            padding: 25px;             
            border: 1px solid rgba(255, 255, 255, 0.8);             
            transition: all 0.3s ease;         
        }         

        .info-card:hover {             
            transform: translateX(5px);             
            background: white;             
            box-shadow: var(--shadow-md);         
        }         

        .info-card h6 {             
            font-size: 1rem;             
            font-weight: 600;             
            color: var(--secondary);             
            margin-bottom: 20px;             
            display: flex;             
            align-items: center;             
            gap: 8px;         
        }         

        .info-item {             
            display: flex;             
            justify-content: space-between;             
            align-items: center;             
            padding: 12px 0;             
            border-bottom: 1px solid rgba(74, 111, 165, 0.1); 
        }         

        .info-item:last-child {             
            border-bottom: none;         
        }         

        .info-label {             
            display: flex;             
            align-items: center;             
            gap: 10px;             
            color: #666;             
            font-weight: 500;             
            font-size: 0.9rem;         
        }         

        .info-label i {             
            width: 20px;             
            color: var(--secondary);         
        }         

        .info-value {             
            font-weight: 700;             
            color: var(--primary);             
            background: rgba(74, 111, 165, 0.05); 
            padding: 5px 12px;             
            border-radius: 20px;             
            font-size: 0.9rem;         
        }         

        /* Activity Section */         
        .recent-activity {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 30px;             
            border: var(--glass-border);         
        }         

        .activity-item {             
            display: flex;             
            align-items: center;             
            gap: 20px;             
            padding: 20px;             
            border-radius: 12px;             
            background: rgba(255, 255, 255, 0.5);             
            margin-bottom: 10px;             
            transition: all 0.3s ease;             
            border: 1px solid rgba(255, 255, 255, 0.8);         
        }         

        .activity-item:hover {             
            background: white;             
            transform: translateX(5px);             
            box-shadow: var(--shadow-md);         
        }         

        .activity-icon {             
            width: 50px;             
            height: 50px;             
            border-radius: 12px;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            font-size: 1.2rem;             
            color: white;             
            flex-shrink: 0;         
        }         

        .activity-icon.entry { background: var(--gradient-1); }         
        .activity-icon.exit { background: var(--gradient-2); }         

        .activity-content {             
            flex: 1;         
        }         

        .activity-title {             
            display: flex;             
            justify-content: space-between;             
            align-items: center;             
            margin-bottom: 5px;         
        }         

        .activity-title strong {             
            color: var(--primary);             
            font-size: 1rem;         
        }         

        .activity-title span {             
            color: var(--secondary);             
            font-weight: 600;             
            font-size: 0.9rem;         
        }         

        .activity-meta {             
            display: flex;             
            justify-content: space-between;             
            align-items: center;         
        }         

        .activity-meta small {             
            color: #888;             
            font-size: 0.85rem;         
        }         

        .activity-status {             
            padding: 4px 12px;             
            border-radius: 50px;             
            background: rgba(46, 139, 87, 0.1);             
            color: var(--success);             
            font-size: 0.8rem;             
            font-weight: 600;         
        }         

        /* Buttons */         
        .btn-custom {             
            padding: 12px 25px;             
            border-radius: 12px;             
            font-weight: 600;             
            font-size: 0.95rem;             
            transition: all 0.3s ease;             
            border: none;             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            color: white;             
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.3); 
        }         

        .btn-custom:hover {             
            transform: translateY(-2px);             
            box-shadow: 0 8px 25px rgba(74, 111, 165, 0.4); 
            color: white;         
        }         

        .btn-outline-custom {             
            background: transparent;             
            border: 2px solid var(--secondary);             
            color: var(--primary);             
            box-shadow: none;         
        }         

        .btn-outline-custom:hover {             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            border-color: transparent;             
            color: white;         
        }         

        /* Avatar Upload Modal */         
        .avatar-preview {             
            width: 150px;             
            height: 150px;             
            border-radius: 50%;             
            object-fit: cover;             
            border: 4px solid var(--secondary);             
            margin: 0 auto 20px;             
            display: block;             
            box-shadow: var(--shadow-lg);         
        }         

        .upload-area {             
            border: 2px dashed var(--secondary);             
            border-radius: 16px;             
            padding: 30px;             
            text-align: center;             
            background: rgba(77, 171, 247, 0.05); 
            cursor: pointer;             
            transition: all 0.3s ease;         
        }         

        .upload-area:hover {             
            background: rgba(77, 171, 247, 0.1); 
            border-color: var(--primary);         
        }         

        .upload-area i {             
            font-size: 3rem;             
            color: var(--secondary);             
            margin-bottom: 10px;         
        }         

        /* Floating Action Button */         
        .fab {             
            position: fixed;             
            bottom: 30px;             
            right: 30px;             
            width: 60px;             
            height: 60px;             
            border-radius: 50%;             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            color: white;             
            border: none;             
            font-size: 1.5rem;             
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4); 
            cursor: pointer;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            z-index: 999;             
            transition: all 0.3s ease;         
        }         

        .fab:hover {             
            transform: scale(1.1);             
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.6); 
        }         

        /* Quick Actions Menu */         
        .quick-actions-menu {             
            position: fixed;             
            bottom: 100px;             
            right: 30px;             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 16px;             
            padding: 15px;             
            box-shadow: var(--shadow-xl);             
            border: var(--glass-border);             
            z-index: 1001;             
            animation: slideIn 0.3s ease-out;             
            min-width: 200px;         
        }         

        .quick-actions-menu .btn-custom {             
            width: 100%;             
            margin-bottom: 10px;         
        }         

        .quick-actions-menu .btn-custom:last-child {             
            margin-bottom: 0;         
        }         

        /* Responsive */         
        @media (max-width: 1200px) {             
            .header-cards {                 
                grid-template-columns: repeat(2, 1fr);             
            }                          
            .info-grid {                 
                grid-template-columns: 1fr;             
            }         
        }         

        @media (max-width: 992px) {             
            .sidebar {                 
                transform: translateX(-100%);                 
                left: 10px;             
            }                          
            .sidebar.active {                 
                transform: translateX(0);             
            }                          
            .main-content {                 
                margin-left: 20px;             
            }                          
            .mobile-menu-btn {                 
                display: block;             
            }         
        }         

        .mobile-menu-btn {             
            display: none;             
            position: fixed;             
            top: 20px;             
            left: 20px;             
            width: 50px;             
            height: 50px;             
            border-radius: 12px;             
            background: var(--gradient-1);             
            color: white;             
            border: none;             
            font-size: 1.2rem;             
            box-shadow: var(--shadow-lg);             
            z-index: 1001;             
            border: 2px solid rgba(255, 255, 255, 0.3);         
        }         

        /* Animations */         
        @keyframes slideIn {             
            from {                 
                opacity: 0;                 
                transform: translateY(20px);             
            }             
            to {                 
                opacity: 1;                 
                transform: translateY(0);             
            }         
        }         

        .header-card, .profile-section, .recent-activity {             
            animation: slideIn 0.5s ease-out;         
        }         

        /* Loading Spinner */         
        .spinner-custom {             
            width: 40px;             
            height: 40px;             
            border: 3px solid rgba(74, 111, 165, 0.1); 
            border-top-color: var(--secondary);             
            border-radius: 50%;             
            animation: spin 1s linear infinite;         
        }         

        @keyframes spin {             
            to { transform: rotate(360deg); }         
        }         

        /* Alerts */         
        .alert-custom {             
            border-radius: 12px;             
            padding: 15px 20px;             
            border: none;             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            color: var(--primary);             
            font-weight: 500;             
            box-shadow: var(--shadow-lg);             
            border-left: 4px solid var(--success);         
        }         

        /* Modal */         
        .modal-content {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border: var(--glass-border);             
            border-radius: 24px;         
        }         

        .modal-header {             
            border-bottom: 1px solid rgba(74, 111, 165, 0.2); 
            padding: 20px 25px;         
        }         

        .modal-header h5 {             
            color: var(--primary);             
            font-weight: 700;         
        }         

        .modal-header i {             
            color: var(--secondary);         
        }         

        .modal-footer {             
            border-top: 1px solid rgba(74, 111, 165, 0.2); 
            padding: 20px 25px;         
        }         

        .btn-close {             
            background-color: var(--secondary);             
            opacity: 0.5;         
        }         

        .btn-close:hover {             
            opacity: 1;         
        }     

        /* Statistiques Section */         
        .stats-container {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 30px;             
            margin-bottom: 30px;             
            border: var(--glass-border);         
        }         

        .stats-grid {             
            display: grid;             
            grid-template-columns: repeat(4, 1fr);             
            gap: 20px;             
            margin-top: 20px;         
        }         

        .stat-card {             
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));             
            border-radius: 16px;             
            padding: 20px;             
            text-align: center;         
        }         

        .stat-number {             
            font-size: 2rem;             
            font-weight: 700;             
            color: var(--primary);         
        }         

        .stat-label {             
            color: #666;             
            font-size: 0.9rem;             
            margin-top: 5px;         
        }         
    </style> 
</head> 
<body>     
    <!-- Mobile Menu Button -->     
    <button class="mobile-menu-btn" onclick="toggleSidebar()">         
        <i class="fas fa-bars"></i>     
    </button>     

    <!-- Floating Action Button -->     
    <button class="fab" onclick="toggleQuickActions()">         
        <i class="fas fa-plus"></i>     
    </button>     

    <!-- Quick Actions Menu (initialement caché) -->     
    <div id="quickActionsMenu" class="quick-actions-menu" style="display: none;">         
        <button class="btn btn-custom" onclick="window.location.href='justificatif.html'">             
            <i class="fas fa-file-alt me-2"></i>Justificatif         
        </button>         
        <button class="btn btn-custom" onclick="window.location.href='conge.html'">             
            <i class="fas fa-calendar-plus me-2"></i>Demande congé         
        </button>     
    </div>     

    <!-- Sidebar -->     
    <div class="sidebar" id="sidebar">

        function showSection(sectionName) {

                loadNotifications();

        function updateActiveNavLink(sectionName) {
            const navLinks = document.querySelectorAll('.nav-link');
            
            navLinks.forEach(link => {
                link.classList.remove('active');
                
                // Vérifier quel onclick est associé
                const onclick = link.getAttribute('onclick') || '';
                if (onclick.includes(`'${sectionName}'`) || onclick.includes(`"${sectionName}"`)) {
                    link.classList.add('active');
                }
            });
        }

        async function loadEmployeeData() {             
            try {                 
                const response = await fetch("profile1.php", {                     
                    method: "GET",                     
                    headers: {                         
                        "Authorization": `Bearer ${token}`,                         
                        "Content-Type": "application/json"                     
                    }                 
                });                      
                if (!response.ok) {                     
                    if (response.status === 401) {                         
                        localStorage.removeItem('jwt');                         
                        window.location.href = 'connexion.html';                         
                        return;                     
                    }                     
                    throw new Error('Erreur');                 
                }                      
                const data = await response.json();                                  
                if (data.success && data.user) {                     
                    employeeData = data.user;                     
                    updateUI();                     
                    loadRecentActivities();                 
                }             
            } catch (error) {                 
                showNotification('Erreur de chargement', 'danger');             
            }         
        }

            }
            if (document.getElementById('rfidBadge')) {

            if (document.getElementById('userEmail')) {

            if (document.getElementById('birthDate')) {

        async function deleteAvatar() {             
            if (!confirm('Êtes-vous sûr de vouloir supprimer votre photo de profil ?')) return;                          
            try {                 
                const response = await fetch('delete_photo.php', {                     
                    method: 'POST',                     
                    headers: {                         
                        'Authorization': `Bearer ${token}`,                         
                        'Content-Type': 'application/json'                     
                    }                 
                });                                  
                const data = await response.json();                                  
                if (data.success) {                     
                    const prenom = employeeData.prenom || 'Jean';                     
                    const nom = employeeData.nom || 'Dupont';                     
                    const defaultAvatar = `https://ui-avatars.com/api/?name=${prenom}+${nom}&size=100&background=4a6fa5&color=fff&bold=true`;                                          
                    document.getElementById('sidebarAvatar').src = defaultAvatar;                     
                    document.getElementById('avatarPreview').src = defaultAvatar;                     
                    employeeData.photo_profil = null;                                          
                    showNotification('Photo supprimée avec succès', 'success');                                          
                    const modal = bootstrap.Modal.getInstance(document.getElementById('avatarModal'));                     
                    if (modal) modal.hide();                                          
                    document.getElementById('avatarInput').value = '';                 
                } else {                     
                    showNotification(data.message || 'Erreur lors de la suppression', 'danger');                 
                }             
            } catch (error) {                 
                console.error('Erreur détaillée:', error);                 
                showNotification('Erreur de connexion au serveur', 'danger');             
            }         
        }              
              
        function previewAvatar(input) {             
            if (input.files && input.files[0]) {                 
                const reader = new FileReader();                 
                reader.onload = function(e) {                     
                    document.getElementById('avatarPreview').src = e.target.result;                 
                };                 
                reader.readAsDataURL(input.files[0]);             
            }         
        }              
              
        function openAvatarModal() {             
            new bootstrap.Modal(document.getElementById('avatarModal')).show();         
        }

                        if (document.getElementById('recentActivityList')) {
                            document.getElementById('recentActivityList').innerHTML = `                             
                                <div class="text-center py-4 text-muted">                                 
                                    <i class="fas fa-user"></i> Informations employé non disponibles                             
                                </div>                         
                            `;
                        }                         
                        return;                     
                    }                                          
                    const employeActivities = data.presences.filter(p =>                          
                        p.employe && p.employe.toLowerCase() === nomComplet.toLowerCase()                     
                    );                                          
                    displayRecentActivities(employeActivities);                 
                } else {                     
                    if (document.getElementById('recentActivityList')) {
                        document.getElementById('recentActivityList').innerHTML = `                         
                            <div class="text-center py-4 text-muted">                             
                                <i class="fas fa-exclamation-circle"></i> Erreur de chargement                         
                            </div>                     
                        `;
                    }                 
                }             
            } catch (error) {                 
                console.error('Erreur:', error);                 
                if (document.getElementById('recentActivityList')) {
                    document.getElementById('recentActivityList').innerHTML = `                     
                        <div class="text-center py-4 text-muted">                         
                            <i class="fas fa-exclamation-circle"></i> Erreur de connexion                     
                        </div>                 
                    `;
                }             
            }         
        }              
              
        function displayRecentActivities(presences) {             
            const container = document.getElementById('recentActivityList');  
            if (!container) return;
                          
            if (!presences || presences.length === 0) {                 
                container.innerHTML = `                     
                    <div class="text-center py-4 text-muted">                         
                        <i class="fas fa-calendar-times"></i> Aucune activité récente                     
                    </div>                 
                `;                 
                return;             
            }                          
            const recent = presences.slice(0, 3);                          
            container.innerHTML = recent.map(p => {                 
                const hasArrival = p.heure_arrivee && p.heure_arrivee !== '00:00:00';                 
                const hasDeparture = p.heure_depart && p.heure_depart !== '00:00:00';                                  
                let icon = 'fa-sign-in-alt';                 
                let iconClass = 'entry';                 
                let title = 'Entrée';                 
                let time = p.heure_arrivee ? p.heure_arrivee.substring(0, 5) : '';                 
                let status = p.statut || 'Présent';                 
                let statusColor = '#2E8B57';                                  
                if (!hasArrival && hasDeparture) {                     
                    icon = 'fa-sign-out-alt';                     
                    iconClass = 'exit';                     
                    title = 'Sortie';                     
                    time = p.heure_depart.substring(0, 5);                 
                }                                  
                if (p.statut === 'retard') {                     
                    statusColor = '#FFA500';                 
                } else if (p.statut === 'absent') {                     
                    statusColor = '#DC143C';                 
                }                                  
                const date = new Date(p.date);                 
                const today = new Date();                 
                const yesterday = new Date();                 
                yesterday.setDate(yesterday.getDate() - 1);                                  
                let dateText = '';                 
                if (date.toDateString() === today.toDateString()) {                     
                    dateText = "Aujourd'hui";                 
                } else if (date.toDateString() === yesterday.toDateString()) {                     
                    dateText = "Hier";                 
                } else {                     
                    dateText = date.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });                 
                }                                  
                let rgbColor = '';                 
                if (statusColor === '#2E8B57') rgbColor = '46,139,87';                 
                else if (statusColor === '#FFA500') rgbColor = '255,165,0';                 
                else if (statusColor === '#DC143C') rgbColor = '220,20,60';                                  
                return `                     
                    <div class="activity-item">                         
                        <div class="activity-icon ${iconClass}">                             
                            <i class="fas ${icon}"></i>                         
                        </div>                         
                        <div class="activity-content">                             
                            <div class="activity-title">                                 
                                <strong>${title}</strong>                                 
                                <span>${time}</span>                             
                            </div>                             
                            <div class="activity-meta">                                 
                                <small>${dateText}</small>                                 
                                <span class="activity-status" style="background: rgba(${rgbColor}, 0.1); color: ${statusColor};">${p.statut || 'Présent'}</span>                             
                            </div>                         
                        </div>                     
                    </div>                 
                `;             
            }).join('');         
        }              

        // ====================================
        // FONCTIONS UTILITAIRES
        // ====================================
              
        function formatDate(date) {             
            if (!date) return '';             
            return new Date(date).toLocaleDateString('fr-FR');         
        }              
              
        function calculateSeniority(date) {             
            const hire = new Date(date);             
            const now = new Date();             
            const years = now.getFullYear() - hire.getFullYear();             
            return years > 0 ? years + ' ans' : 'Nouveau';         
        }              
              
        function updateCurrentTime() {             
            const now = new Date();             
            const timeElement = document.getElementById('currentTime');
            if (timeElement) {
                timeElement.textContent =                  
                    now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            }         
        }              
              
        function setupEventListeners() {             
            document.getElementById('avatarForm').addEventListener('submit', function(e) {                 
                e.preventDefault();                 
                const file = document.getElementById('avatarInput').files[0];                 
                if (file) uploadAvatar(file);                 
                else showNotification('Choisissez une image', 'warning');             
            });         
        }              
              
        function toggleSidebar() {             
            document.getElementById('sidebar').classList.toggle('active');         
        }              
                      
        function toggleQuickActions() {             
            const menu = document.getElementById('quickActionsMenu');             
            if (menu.style.display === 'none' || menu.style.display === '') {                 
                menu.style.display = 'block';                 
                setTimeout(() => {                     
                    document.addEventListener('click', function hideMenu(e) {                         
                        if (!menu.contains(e.target) && !e.target.closest('.fab')) {                             
                            menu.style.display = 'none';                             
                            document.removeEventListener('click', hideMenu);                         
                        }                     
                    });                 
                }, 100);             
            } else {                 
                menu.style.display = 'none';             
            }         
        }              
              
        function showNotifications() {             
            showSection('notifications');         
        }              
              
        function showAllActivities() {             
            window.location.href = 'activites.html';         
        }              
              
        function showNotification(message, type = 'info') {             
            const colors = {                 
                success: '#2E8B57',                 
                danger: '#DC143C',                 
                warning: '#FFA500',                 
                info: '#4a6fa5'             
            };                          
            const notification = document.createElement('div');             
            notification.style.cssText = `                 
                position: fixed;                 
                top: 20px;                 
                right: 20px;                 
                background: var(--glass-bg);                 
                backdrop-filter: blur(10px);                 
                color: ${colors[type]};                 
                padding: 15px 25px;                 
                border-radius: 12px;                 
                box-shadow: var(--shadow-xl);                 
                border-left: 4px solid ${colors[type]};                 
                font-weight: 500;                 
                z-index: 9999;                 
                animation: slideIn 0.3s ease-out;             
            `;             
            notification.innerHTML = `                 
                <i class="fas fa-${type === 'success' ? 'check-circle' :                                   
                                  type === 'danger' ? 'exclamation-circle' :                                   
                                  type === 'warning' ? 'exclamation-triangle' : 'info-circle'} me-2"                     
                    style="color: ${colors[type]};"></i>                 
                ${message}             
            `;                          
            document.body.appendChild(notification);                          
            setTimeout(() => {                 
                notification.style.animation = 'slideOut 0.3s ease-out';                 
                setTimeout(() => notification.remove(), 300);             
            }, 3000);         
        }

async function loadNotifications() {
    try {
        const response = await fetch('notifications.php?action=get_notifications', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await response.json();

        if (data.success) {
            const notifs = (data.notifications || []).filter(n => n.type === 'conge');

            // Badge
            const nonLues = notifs.filter(n => !n.lu || n.lu == 0).length;
            const badge = document.getElementById('notificationBadge');
            const count = document.getElementById('notifHeaderCount');

            if (badge) {
                badge.textContent = nonLues;
                badge.style.display = nonLues > 0 ? 'flex' : 'none';
            }
            if (count) {
                count.textContent = nonLues;
                count.style.display = nonLues > 0 ? 'flex' : 'none';
            }

            const liste = document.getElementById('notificationsList');
            if (!liste) return;

            if (notifs.length === 0) {
                liste.innerHTML = `
                    <div style="padding:30px;text-align:center;color:rgba(255,255,255,0.4);">
                        <i class="fas fa-bell-slash fa-2x" style="display:block;margin-bottom:10px;"></i>
                        <p style="margin:0;">Aucune notification</p>
                    </div>`;
                return;
            }

            liste.innerHTML = notifs.map(n => {
                const nonLu     = !n.lu || n.lu == 0;
                const isAccepte = n.message && n.message.includes('acceptée');
                const iconColor = isAccepte ? '#28a745' : '#dc3545';
                const iconBg    = isAccepte ? 'rgba(40,167,69,0.15)' : 'rgba(220,53,69,0.15)';
                const iconTag   = isAccepte
                    ? '<i class="fas fa-check-circle"></i>'
                    : '<i class="fas fa-times-circle"></i>';

                return `
                    <li onclick="marquerUneLue('${n.id}')" style="
                        padding:15px 20px;
                        border-bottom:1px solid rgba(255,255,255,0.05);
                        cursor:pointer;
                        list-style:none;
                        transition:all 0.3s ease;
                        ${nonLu ? 'background:rgba(77,171,247,0.07);border-left:3px solid #4dabf7;' : ''}
                    " onmouseover="this.style.background='rgba(255,255,255,0.05)'"
                       onmouseout="this.style.background='${nonLu ? 'rgba(77,171,247,0.07)' : 'transparent'}'">
                        <div style="display:flex;align-items:flex-start;gap:12px;">
                            <div style="
                                width:36px;height:36px;border-radius:10px;
                                background:${iconBg};color:${iconColor};
                                display:flex;align-items:center;justify-content:center;
                                flex-shrink:0;font-size:1rem;
                            ">${iconTag}</div>
                            <div style="flex:1;min-width:0;">
                                <div style="
                                    color:rgba(255,255,255,0.9);
                                    font-size:0.9rem;
                                    margin-bottom:3px;
                                    line-height:1.4;
                                    ${nonLu ? 'font-weight:600;' : ''}
                                ">${n.message}</div>
                                <div style="color:rgba(255,255,255,0.45);font-size:0.78rem;">
                                    ${formatTemps(n.date)}
                                </div>
                            </div>
                            ${nonLu ? '<div style="width:8px;height:8px;background:#4dabf7;border-radius:50%;flex-shrink:0;margin-top:4px;"></div>' : ''}
                        </div>
                    </li>`;
            }).join('');
        }
    } catch (error) {
        console.error('Erreur notifications:', error);
    }
}
async function marquerUneLue(id) {
    try {
        await fetch('notifications.php', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ action: 'mark_one_read', notification_id: id })
        });
        loadNotifications();
    } catch(e) { console.error(e); }
}

async function marquerToutesLues() {
    try {
        await fetch('notifications.php', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ action: 'mark_read' })
        });
        loadNotifications();
    } catch(e) { console.error(e); }
}

function formatTemps(dateStr) {
    if (!dateStr) return '';
    const diff = Math.floor((new Date() - new Date(dateStr)) / 60000);
    if (diff < 1)   return 'À l\'instant';
    if (diff < 60)  return `Il y a ${diff} min`;
    if (diff < 1440) return `Il y a ${Math.floor(diff/60)}h`;
    return `Il y a ${Math.floor(diff/1440)} jour(s)`;
}
