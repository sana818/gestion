<!DOCTYPE html> 
<html lang="fr"> 
<head>     
    <meta charset="UTF-8">     
    <meta name="viewport" content="width=device-width, initial-scale=1.0">     
    <title>EmployeeSpace Pro - Tableau de bord</title>     
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">     
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">     
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">     
    <style>         
        * {             
            margin: 0;             
            padding: 0;             
            box-sizing: border-box;         
        }         

        :root {             
            --primary: #4a6fa5;        
            --primary-light: #5a7bb5;   
            --secondary: #4dabf7;        
            --accent: #90caf9;           
            --success: #2E8B57;             
            --warning: #FFA500;             
            --danger: #DC143C;             
            --info: #4a6fa5;             
            --dark: #1A1A2E;             
            --light: #F8F9FA;             
            --gradient-1: linear-gradient(135deg, #4a6fa5 0%, #4dabf7 100%); 
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);             
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);             
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);             
            --glass-bg: rgba(255, 255, 255, 0.95);             
            --glass-border: 1px solid rgba(255, 255, 255, 0.2);             
            --sidebar-width: 300px;             
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.02);             
            --shadow-md: 0 4px 6px rgba(0,0,0,0.05);             
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);             
            --shadow-xl: 0 20px 25px rgba(0,0,0,0.15);         
        }         

        body {             
            font-family: 'Inter', sans-serif;             
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);             
            min-height: 100vh;             
            color: var(--dark);         
        }         

        /* Glassmorphism Sidebar */         
        .sidebar {             
            position: fixed;             
            left: 20px;             
            top: 20px;             
            bottom: 20px;             
            width: var(--sidebar-width);             
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); 
            backdrop-filter: blur(10px);             
            border-radius: 24px;             
            box-shadow: var(--shadow-xl), 0 0 0 1px rgba(255, 255, 255, 0.5);             
            z-index: 1000;             
            overflow-y: auto;             
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);             
            border: 1px solid rgba(255, 255, 255, 0.1);         
        }         

        .sidebar::-webkit-scrollbar {             
            width: 5px;         
        }         

        .sidebar::-webkit-scrollbar-track {             
            background: transparent;         
        }         

        .sidebar::-webkit-scrollbar-thumb {             
            background: var(--secondary);             
            border-radius: 10px;         
        }         

        .sidebar-header {             
            padding: 30px 25px 20px;             
            text-align: center;             
            position: relative;         
        }         

        .sidebar-header::after {             
            content: '';             
            position: absolute;             
            bottom: 0;             
            left: 15%;             
            width: 70%;             
            height: 1px;             
            background: linear-gradient(90deg, transparent, var(--secondary), transparent);         
        }         

        .user-avatar-wrapper {             
            position: relative;             
            width: 100px;             
            height: 100px;             
            margin: 0 auto 15px;             
            cursor: pointer;         
        }         

        .user-avatar {             
            width: 100px;             
            height: 100px;             
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;             
            object-fit: cover;             
            border: 3px solid white;             
            box-shadow: var(--shadow-lg), 0 0 0 3px rgba(255, 255, 255, 0.5);             
            transition: all 0.5s ease;             
            animation: morphing 8s ease-in-out infinite;         
        }         

        @keyframes morphing {             
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }             
            25% { border-radius: 58% 42% 75% 25% / 76% 46% 54% 24%; }             
            50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }             
            75% { border-radius: 33% 67% 58% 42% / 63% 68% 32% 37%; }             
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }         
        }         

        .user-avatar:hover {             
            transform: scale(1.05) rotate(5deg);         
        }         

        .online-indicator {             
            position: absolute;             
            bottom: 10px;             
            right: 10px;             
            width: 15px;             
            height: 15px;             
            background: var(--success);             
            border-radius: 50%;             
            border: 2px solid white;             
            animation: pulse 2s infinite;         
        }         

        @keyframes pulse {             
            0% { box-shadow: 0 0 0 0 rgba(46, 139, 87, 0.7); }             
            70% { box-shadow: 0 0 0 10px rgba(46, 139, 87, 0); }             
            100% { box-shadow: 0 0 0 0 rgba(46, 139, 87, 0); }         
        }         

        .user-name {             
            font-size: 1.4rem;             
            font-weight: 700;             
            background: linear-gradient(135deg, #fff, var(--secondary));             
            -webkit-background-clip: text;             
            -webkit-text-fill-color: transparent;             
            margin-bottom: 5px;         
        }         

        .user-title {             
            display: inline-block;             
            padding: 5px 15px;             
            background: linear-gradient(135deg, rgba(74, 111, 165, 0.1), rgba(77, 171, 247, 0.1)); 
            border-radius: 20px;             
            font-size: 0.85rem;             
            font-weight: 600;             
            color: var(--secondary);             
            margin-top: 5px;         
        }         

        .time-display {             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            color: white;             
            padding: 10px 20px;             
            border-radius: 50px;             
            font-size: 1rem;             
            margin: 20px auto 10px;             
            display: inline-flex;             
            align-items: center;             
            gap: 10px;             
            box-shadow: var(--shadow-md);             
            border: 1px solid rgba(255, 255, 255, 0.3);         
        }         

        /* Navigation */         
        .sidebar-nav {             
            padding: 20px 15px;         
        }         

        .nav-item {             
            margin-bottom: 5px;         
        }         

        .nav-link {             
            padding: 14px 20px;             
            border-radius: 12px;             
            color: rgba(255, 255, 255, 0.8);             
            font-weight: 500;             
            transition: all 0.3s ease;             
            position: relative;             
            overflow: hidden;             
            text-decoration: none;             
            display: flex;             
            align-items: center;             
            cursor: pointer;         
        }         

        .nav-link::before {             
            content: '';             
            position: absolute;             
            top: 0;             
            left: 0;             
            width: 100%;             
            height: 100%;             
            background: linear-gradient(90deg, rgba(77, 171, 247, 0.1), transparent);             
            transform: translateX(-100%);             
            transition: transform 0.4s ease;         
        }         

        .nav-link:hover::before {             
            transform: translateX(0);         
        }         

        .nav-link.active {             
            background: linear-gradient(90deg, rgba(77, 171, 247, 0.15), transparent);             
            color: white;             
            border-left: 4px solid var(--secondary);             
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.2);         
        }         

        .nav-link.active i {             
            color: var(--secondary);         
        }         

        .nav-link i {             
            width: 24px;             
            font-size: 1.2rem;             
            color: rgba(255, 255, 255, 0.6);             
            transition: all 0.3s ease;         
        }         

        .badge-notification {             
            margin-left: auto;             
            background: var(--gradient-2);             
            color: white;             
            border-radius: 50px;             
            padding: 4px 8px;             
            font-size: 0.7rem;             
            font-weight: 600;             
            box-shadow: var(--shadow-sm);         
        }         

        /* Main Content */         
        .main-content {             
            margin-left: calc(var(--sidebar-width) + 30px);             
            padding: 20px 30px;             
            min-height: 100vh;         
        }         

        /* Header Cards */         
        .header-cards {             
            display: grid;             
            grid-template-columns: repeat(4, 1fr);             
            gap: 20px;             
            margin-bottom: 30px;         
        }         

        .header-card {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 25px;             
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.5);             
            transition: all 0.3s ease;             
            position: relative;             
            overflow: hidden;             
            z-index: 1;             
            border: var(--glass-border);         
        }         

        .header-card::before {             
            content: '';             
            position: absolute;             
            top: 0;             
            left: 0;             
            right: 0;             
            bottom: 0;             
            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));             
            z-index: -1;         
        }         

        .header-card:hover {             
            transform: translateY(-5px) scale(1.02);             
            box-shadow: var(--shadow-xl);         
        }         

        .header-card .card-icon {             
            width: 50px;             
            height: 50px;             
            border-radius: 15px;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            font-size: 1.5rem;             
            margin-bottom: 15px;             
            background: var(--gradient-1);             
            color: white;             
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4);         
        }         

        .card-icon.entry { background: var(--gradient-1); }         
        .card-icon.exit { background: var(--gradient-2); }         
        .card-icon.grade { background: var(--gradient-3); }         
        .card-icon.date { background: var(--gradient-4); }         

        .card-value {             
            font-size: 1.8rem;             
            font-weight: 700;             
            color: var(--primary);             
            line-height: 1.2;         
        }         

        .card-label {             
            color: #666;             
            font-size: 0.9rem;             
            font-weight: 500;         
        }         

        /* Profile Section */         
        .profile-section {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 30px;             
            margin-bottom: 30px;             
            border: var(--glass-border);         
        }         

        .section-title {             
            display: flex;             
            align-items: center;             
            gap: 10px;             
            margin-bottom: 25px;             
            padding-bottom: 15px;             
            border-bottom: 2px dashed rgba(74, 111, 165, 0.2); 
        }         

        .section-title i {             
            width: 40px;             
            height: 40px;             
            border-radius: 10px;             
            background: var(--gradient-1);             
            color: white;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            font-size: 1.2rem;         
        }         

        .section-title h4 {             
            font-size: 1.3rem;             
            font-weight: 700;             
            margin: 0;             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            -webkit-background-clip: text;             
            -webkit-text-fill-color: transparent;         
        }         

        .info-grid {             
            display: grid;             
            grid-template-columns: repeat(2, 1fr);             
            gap: 25px;         
        }         

        .info-card {             
            background: rgba(255, 255, 255, 0.5);             
            backdrop-filter: blur(5px);             
            border-radius: 16px;             
            padding: 25px;             
            border: 1px solid rgba(255, 255, 255, 0.8);             
            transition: all 0.3s ease;         
        }         

        .info-card:hover {             
            transform: translateX(5px);             
            background: white;             
            box-shadow: var(--shadow-md);         
        }         

        .info-card h6 {             
            font-size: 1rem;             
            font-weight: 600;             
            color: var(--secondary);             
            margin-bottom: 20px;             
            display: flex;             
            align-items: center;             
            gap: 8px;         
        }         

        .info-item {             
            display: flex;             
            justify-content: space-between;             
            align-items: center;             
            padding: 12px 0;             
            border-bottom: 1px solid rgba(74, 111, 165, 0.1); 
        }         

        .info-item:last-child {             
            border-bottom: none;         
        }         

        .info-label {             
            display: flex;             
            align-items: center;             
            gap: 10px;             
            color: #666;             
            font-weight: 500;             
            font-size: 0.9rem;         
        }         

        .info-label i {             
            width: 20px;             
            color: var(--secondary);         
        }         

        .info-value {             
            font-weight: 700;             
            color: var(--primary);             
            background: rgba(74, 111, 165, 0.05); 
            padding: 5px 12px;             
            border-radius: 20px;             
            font-size: 0.9rem;         
        }         

        /* Activity Section */         
        .recent-activity {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 30px;             
            border: var(--glass-border);         
        }         

        .activity-item {             
            display: flex;             
            align-items: center;             
            gap: 20px;             
            padding: 20px;             
            border-radius: 12px;             
            background: rgba(255, 255, 255, 0.5);             
            margin-bottom: 10px;             
            transition: all 0.3s ease;             
            border: 1px solid rgba(255, 255, 255, 0.8);         
        }         

        .activity-item:hover {             
            background: white;             
            transform: translateX(5px);             
            box-shadow: var(--shadow-md);         
        }         

        .activity-icon {             
            width: 50px;             
            height: 50px;             
            border-radius: 12px;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            font-size: 1.2rem;             
            color: white;             
            flex-shrink: 0;         
        }         

        .activity-icon.entry { background: var(--gradient-1); }         
        .activity-icon.exit { background: var(--gradient-2); }         

        .activity-content {             
            flex: 1;         
        }         

        .activity-title {             
            display: flex;             
            justify-content: space-between;             
            align-items: center;             
            margin-bottom: 5px;         
        }         

        .activity-title strong {             
            color: var(--primary);             
            font-size: 1rem;         
        }         

        .activity-title span {             
            color: var(--secondary);             
            font-weight: 600;             
            font-size: 0.9rem;         
        }         

        .activity-meta {             
            display: flex;             
            justify-content: space-between;             
            align-items: center;         
        }         

        .activity-meta small {             
            color: #888;             
            font-size: 0.85rem;         
        }         

        .activity-status {             
            padding: 4px 12px;             
            border-radius: 50px;             
            background: rgba(46, 139, 87, 0.1);             
            color: var(--success);             
            font-size: 0.8rem;             
            font-weight: 600;         
        }         

        /* Buttons */         
        .btn-custom {             
            padding: 12px 25px;             
            border-radius: 12px;             
            font-weight: 600;             
            font-size: 0.95rem;             
            transition: all 0.3s ease;             
            border: none;             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            color: white;             
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.3); 
        }         

        .btn-custom:hover {             
            transform: translateY(-2px);             
            box-shadow: 0 8px 25px rgba(74, 111, 165, 0.4); 
            color: white;         
        }         

        .btn-outline-custom {             
            background: transparent;             
            border: 2px solid var(--secondary);             
            color: var(--primary);             
            box-shadow: none;         
        }         

        .btn-outline-custom:hover {             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            border-color: transparent;             
            color: white;         
        }         

        /* Avatar Upload Modal */         
        .avatar-preview {             
            width: 150px;             
            height: 150px;             
            border-radius: 50%;             
            object-fit: cover;             
            border: 4px solid var(--secondary);             
            margin: 0 auto 20px;             
            display: block;             
            box-shadow: var(--shadow-lg);         
        }         

        .upload-area {             
            border: 2px dashed var(--secondary);             
            border-radius: 16px;             
            padding: 30px;             
            text-align: center;             
            background: rgba(77, 171, 247, 0.05); 
            cursor: pointer;             
            transition: all 0.3s ease;         
        }         

        .upload-area:hover {             
            background: rgba(77, 171, 247, 0.1); 
            border-color: var(--primary);         
        }         

        .upload-area i {             
            font-size: 3rem;             
            color: var(--secondary);             
            margin-bottom: 10px;         
        }         

        /* Floating Action Button */         
        .fab {             
            position: fixed;             
            bottom: 30px;             
            right: 30px;             
            width: 60px;             
            height: 60px;             
            border-radius: 50%;             
            background: linear-gradient(135deg, var(--primary), var(--secondary));             
            color: white;             
            border: none;             
            font-size: 1.5rem;             
            box-shadow: 0 4px 15px rgba(74, 111, 165, 0.4); 
            cursor: pointer;             
            display: flex;             
            align-items: center;             
            justify-content: center;             
            z-index: 999;             
            transition: all 0.3s ease;         
        }         

        .fab:hover {             
            transform: scale(1.1);             
            box-shadow: 0 6px 20px rgba(74, 111, 165, 0.6); 
        }         

        /* Quick Actions Menu */         
        .quick-actions-menu {             
            position: fixed;             
            bottom: 100px;             
            right: 30px;             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 16px;             
            padding: 15px;             
            box-shadow: var(--shadow-xl);             
            border: var(--glass-border);             
            z-index: 1001;             
            animation: slideIn 0.3s ease-out;             
            min-width: 200px;         
        }         

        .quick-actions-menu .btn-custom {             
            width: 100%;             
            margin-bottom: 10px;         
        }         

        .quick-actions-menu .btn-custom:last-child {             
            margin-bottom: 0;         
        }         

        /* Responsive */         
        @media (max-width: 1200px) {             
            .header-cards {                 
                grid-template-columns: repeat(2, 1fr);             
            }                          
            .info-grid {                 
                grid-template-columns: 1fr;             
            }         
        }         

        @media (max-width: 992px) {             
            .sidebar {                 
                transform: translateX(-100%);                 
                left: 10px;             
            }                          
            .sidebar.active {                 
                transform: translateX(0);             
            }                          
            .main-content {                 
                margin-left: 20px;             
            }                          
            .mobile-menu-btn {                 
                display: block;             
            }         
        }         

        .mobile-menu-btn {             
            display: none;             
            position: fixed;             
            top: 20px;             
            left: 20px;             
            width: 50px;             
            height: 50px;             
            border-radius: 12px;             
            background: var(--gradient-1);             
            color: white;             
            border: none;             
            font-size: 1.2rem;             
            box-shadow: var(--shadow-lg);             
            z-index: 1001;             
            border: 2px solid rgba(255, 255, 255, 0.3);         
        }         

        /* Animations */         
        @keyframes slideIn {             
            from {                 
                opacity: 0;                 
                transform: translateY(20px);             
            }             
            to {                 
                opacity: 1;                 
                transform: translateY(0);             
            }         
        }         

        .header-card, .profile-section, .recent-activity {             
            animation: slideIn 0.5s ease-out;         
        }         

        /* Loading Spinner */         
        .spinner-custom {             
            width: 40px;             
            height: 40px;             
            border: 3px solid rgba(74, 111, 165, 0.1); 
            border-top-color: var(--secondary);             
            border-radius: 50%;             
            animation: spin 1s linear infinite;         
        }         

        @keyframes spin {             
            to { transform: rotate(360deg); }         
        }         

        /* Alerts */         
        .alert-custom {             
            border-radius: 12px;             
            padding: 15px 20px;             
            border: none;             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            color: var(--primary);             
            font-weight: 500;             
            box-shadow: var(--shadow-lg);             
            border-left: 4px solid var(--success);         
        }         

        /* Modal */         
        .modal-content {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border: var(--glass-border);             
            border-radius: 24px;         
        }         

        .modal-header {             
            border-bottom: 1px solid rgba(74, 111, 165, 0.2); 
            padding: 20px 25px;         
        }         

        .modal-header h5 {             
            color: var(--primary);             
            font-weight: 700;         
        }         

        .modal-header i {             
            color: var(--secondary);         
        }         

        .modal-footer {             
            border-top: 1px solid rgba(74, 111, 165, 0.2); 
            padding: 20px 25px;         
        }         

        .btn-close {             
            background-color: var(--secondary);             
            opacity: 0.5;         
        }         

        .btn-close:hover {             
            opacity: 1;         
        }     

        /* Statistiques Section */         
        .stats-container {             
            background: var(--glass-bg);             
            backdrop-filter: blur(10px);             
            border-radius: 20px;             
            padding: 30px;             
            margin-bottom: 30px;             
            border: var(--glass-border);         
        }         

        .stats-grid {             
            display: grid;             
            grid-template-columns: repeat(4, 1fr);             
            gap: 20px;             
            margin-top: 20px;         
        }         

        .stat-card {             
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));             
            border-radius: 16px;             
            padding: 20px;             
            text-align: center;         
        }         

        .stat-number {             
            font-size: 2rem;             
            font-weight: 700;             
            color: var(--primary);         
        }         

        .stat-label {             
            color: #666;             
            font-size: 0.9rem;             
            margin-top: 5px;         
        }         
    </style> 
</head> 
<body>     
    <!-- Mobile Menu Button -->     
    <button class="mobile-menu-btn" onclick="toggleSidebar()">         
        <i class="fas fa-bars"></i>     
    </button>     

    <!-- Floating Action Button -->     
    <button class="fab" onclick="toggleQuickActions()">         
        <i class="fas fa-plus"></i>     
    </button>     

    <!-- Quick Actions Menu (initialement caché) -->     
    <div id="quickActionsMenu" class="quick-actions-menu" style="display: none;">         
        <button class="btn btn-custom" onclick="window.location.href='justificatif.html'">             
            <i class="fas fa-file-alt me-2"></i>Justificatif         
        </button>         
        <button class="btn btn-custom" onclick="window.location.href='conge.html'">             
            <i class="fas fa-calendar-plus me-2"></i>Demande congé         
        </button>     
    </div>     

    <!-- Sidebar -->     
    <div class="sidebar" id="sidebar">
